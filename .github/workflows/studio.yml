name: Studio — live dashboard sync
on:
  schedule:
    - cron: "23 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Fetch GitHub data and patch studio SVGs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: ${{ github.repository_owner }}
        run: python scripts/patch_studio.py

      - name: Commit studio updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/dashboard-data.json assets/studio-hero.svg assets/studio-dashboard.svg assets/studio-projects.svg
          git diff --cached --quiet && echo "No studio changes" && exit 0
          git commit -m "chore(studio): sync live dashboard and project data"
          git push
