name: Studio — live dashboard sync
on:
  schedule:
    - cron: "23 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify studio scripts exist
        run: |
          test -f scripts/patch_studio.py
          test -f scripts/build_native_studio.py
          test -f assets/ak-monogram.svg

      - name: Fetch GitHub data and patch studio SVGs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: ${{ github.repository_owner }}
        run: python3 scripts/patch_studio.py

      - name: Commit studio updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/dashboard-data.json assets/studio-hero.svg assets/studio-dashboard.svg assets/studio-projects.svg
          if git diff --cached --quiet; then
            echo "No studio changes to commit"
            exit 0
          fi
          git commit -m "chore(studio): sync live dashboard and project data"
          git push
