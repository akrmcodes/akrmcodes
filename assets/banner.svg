<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
      .text {
        font: bold 64px 'Segoe UI', sans-serif;
        font-size: 64px;
        fill: white;
        text-anchor: middle;
        dominant-baseline: middle;
        animation: reveal 2.5s ease-out forwards, glow 3s ease-in-out infinite;
      }

      @keyframes reveal {
        0%   { opacity: 0; letter-spacing: 2px; transform: translateY(25px); }
        50%  { opacity: 1; transform: translateY(0); }
        100% { letter-spacing: 4px; }
      }

      @keyframes glow {
        0%, 100% { text-shadow: 0 0 6px #fff, 0 0 14px #09f; }
        50%      { text-shadow: 0 0 12px #fff, 0 0 26px #0ff; }
      }

      .particle {
        fill: white;
        opacity: 0.75;
        animation: float 6s ease-in-out infinite;
      }

      @keyframes float {
        0%, 100% { transform: translate(0, 0); }
        50%      { transform: translate(4px, -12px); }
      }
    ]]></style>
  </defs>

  <!-- Particles (glowing circles) -->
  <circle class="particle" cx="120" cy="320" r="3" />
  <circle class="particle" cx="300" cy="370" r="2.5" />
  <circle class="particle" cx="600" cy="280" r="2" />
  <circle class="particle" cx="700" cy="50"  r="3.5" />
  <circle class="particle" cx="400" cy="100" r="2.2" />
  <circle class="particle" cx="150" cy="50"  r="4" />

  <!-- Glowing Animated Text -->
  <text class="text" x="400" y="200">AkrmCodes</text>
</svg>
