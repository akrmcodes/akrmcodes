<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none" aria-labelledby="dashTitle dashDesc">
  <title id="dashTitle">Studio Dashboard</title>
  <desc id="dashDesc">Live designer workstation dashboard with stats, skills marquee, languages, and build focus.</desc>
  <defs>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4b1ab1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="14" fill="#0f0c1c"/>
  <rect x="1" y="1" width="1198" height="718" rx="13" stroke="url(#violet)" stroke-opacity=".3" fill="none"/>
  <foreignObject width="1200" height="720">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:1200px;height:720px;font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;box-sizing:border-box;padding:20px;">
      <style>
        :root{--bg:#0f0c1c;--card:rgba(20,16,36,.85);--text:#f5f3ff;--muted:#a78bfa;--dim:#6b7280;--accent:#7c3aed;--cyan:#22d3ee;--border:rgba(124,58,237,.28)}
        @media (prefers-color-scheme:light){:root{--bg:#f4f0ff;--card:rgba(255,255,255,.9);--text:#1a1033;--muted:#5b21b6;--dim:#6b7280;--border:rgba(109,40,217,.2)}}
        *{box-sizing:border-box;margin:0;padding:0}
        .grid{display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(4,1fr);gap:14px;height:680px}
        .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;color:var(--text);overflow:hidden;position:relative}
        .card h3{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:12px;font-weight:700}
        .identity{grid-column:1/3;grid-row:1/3;display:flex;flex-direction:column;justify-content:space-between}
        .identity img{width:72px;height:72px;border-radius:50%;margin-bottom:12px}
        .identity .name{font-size:22px;font-weight:700;margin-bottom:4px}
        .identity .role{font-size:13px;color:var(--muted);margin-bottom:12px}
        .identity .quote{font-size:12px;font-style:italic;color:var(--muted);line-height:1.5;border-left:2px solid var(--accent);padding-left:10px}
        .stats{grid-column:3/7;grid-row:1/3}
        .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
        .stat{background:rgba(124,58,237,.1);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
        .stat .num{font-size:28px;font-weight:700;color:var(--text);line-height:1}
        .stat .lbl{font-size:10px;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:.06em}
        .marquee{grid-column:1/7;grid-row:3/4;overflow:hidden}
        .track{display:flex;gap:12px;animation:scroll 28s linear infinite;width:max-content}
        .skill{padding:8px 16px;border-radius:8px;background:rgba(124,58,237,.12);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap}
        .langs{grid-column:1/4;grid-row:4/5}
        .lang{margin-bottom:10px}
        .lang-top{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;color:var(--muted)}
        .bar{height:6px;border-radius:3px;background:rgba(124,58,237,.15);overflow:hidden}
        .bar span{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,#7c3aed,#a5f3fc)}
        .terminal{grid-column:4/5;grid-row:4/5;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
        .term-bar{display:flex;gap:5px;margin-bottom:10px}
        .term-bar i{width:9px;height:9px;border-radius:50%;display:block}
        .term-bar i:nth-child(1){background:#ff5f57}
        .term-bar i:nth-child(2){background:#febc2e}
        .term-bar i:nth-child(3){background:#28c840}
        .term-body{font-size:11px;line-height:1.7;color:var(--muted)}
        .term-body .prompt{color:var(--accent)}
        .term-body .cmd{color:var(--cyan)}
        .activity{grid-column:5/7;grid-row:4/5}
        .heat{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px}
        .cell{width:10px;height:10px;border-radius:2px;background:rgba(124,58,237,.12)}
        .cell.on{background:#7c3aed}
        .cell.mid{background:#4b1ab1}
        .cell.hi{background:#a5f3fc}
        @keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
        @media (prefers-reduced-motion:reduce){.track{animation:none}}
      </style>
      <div class="grid">
        <div class="card identity">
          <div>
            <img src="data:image/svg+xml;base64," alt="AK"/>
            <div class="name">Akrm Qubati</div>
            <div class="role">Designer-Engineer &middot; Sana'a, Yemen</div>
          </div>
          <div class="quote">Crafting code through a designer's lens  web, mobile, and systems that feel as good as they function.</div>
        </div>
        <div class="card stats">
          <h3>Live Telemetry</h3>
          <div class="stat-row">
            <div class="stat"><div class="num"><!-- LIVE:stars -->6<!-- /LIVE:stars --></div><div class="lbl">Stars</div></div>
            <div class="stat"><div class="num"><!-- LIVE:repos -->21<!-- /LIVE:repos --></div><div class="lbl">Repos</div></div>
            <div class="stat"><div class="num"><!-- LIVE:streak -->0<!-- /LIVE:streak --></div><div class="lbl">Streak</div></div>
          </div>
          <div class="stat-row" style="margin-top:10px">
            <div class="stat"><div class="num"><!-- LIVE:commits -->410<!-- /LIVE:commits --></div><div class="lbl">Commits</div></div>
            <div class="stat"><div class="num"><!-- LIVE:followers -->6<!-- /LIVE:followers --></div><div class="lbl">Followers</div></div>
            <div class="stat"><div class="num"><!-- LIVE:prs -->53<!-- /LIVE:prs --></div><div class="lbl">PRs</div></div>
          </div>
        </div>
        <div class="card marquee">
          <h3>Stack Marquee</h3>
          <div class="track">
            <span class="skill">React</span><span class="skill">Next.js</span><span class="skill">TypeScript</span><span class="skill">Tailwind</span><span class="skill">Laravel</span><span class="skill">Node.js</span><span class="skill">Python</span><span class="skill">Flutter</span><span class="skill">Firebase</span><span class="skill">Figma</span><span class="skill">Framer Motion</span><span class="skill">Rive</span><span class="skill">Docker</span><span class="skill">MySQL</span><span class="skill">GraphQL</span><span class="skill">OpenAI</span><span class="skill">LangChain</span><span class="skill">Sanity</span>
            <span class="skill">React</span><span class="skill">Next.js</span><span class="skill">TypeScript</span><span class="skill">Tailwind</span><span class="skill">Laravel</span><span class="skill">Node.js</span><span class="skill">Python</span><span class="skill">Flutter</span><span class="skill">Firebase</span><span class="skill">Figma</span><span class="skill">Framer Motion</span><span class="skill">Rive</span><span class="skill">Docker</span><span class="skill">MySQL</span><span class="skill">GraphQL</span><span class="skill">OpenAI</span><span class="skill">LangChain</span><span class="skill">Sanity</span>
          </div>
        </div>
        <div class="card langs">
          <h3>Top Languages</h3>
          <div class="lang"><div class="lang-top"><span><!-- LIVE:lang1_name -->TypeScript<!-- /LIVE:lang1_name --></span><span><!-- LIVE:lang1_pct -->45%<!-- /LIVE:lang1_pct --></span></div><div class="bar"><span style="width:<!-- LIVE:lang1_bar -->45%<!-- /LIVE:lang1_bar -->"></span></div></div>
          <div class="lang"><div class="lang-top"><span><!-- LIVE:lang2_name -->Other<!-- /LIVE:lang2_name --></span><span><!-- LIVE:lang2_pct -->27%<!-- /LIVE:lang2_pct --></span></div><div class="bar"><span style="width:<!-- LIVE:lang2_bar -->27%<!-- /LIVE:lang2_bar -->"></span></div></div>
          <div class="lang"><div class="lang-top"><span><!-- LIVE:lang3_name -->JavaScript<!-- /LIVE:lang3_name --></span><span><!-- LIVE:lang3_pct -->27%<!-- /LIVE:lang3_pct --></span></div><div class="bar"><span style="width:<!-- LIVE:lang3_bar -->27%<!-- /LIVE:lang3_bar -->"></span></div></div>
        </div>
        <div class="card terminal">
          <h3>Building Now</h3>
          <div class="term-bar"><i></i><i></i><i></i></div>
          <div class="term-body">
            <div><span class="prompt">$</span> <span class="cmd">akrm</span>  focus</div>
            <div><span class="prompt">&middot;</span> <!-- LIVE:building -->Next.js design systems<!-- /LIVE:building --></div>
          </div>
        </div>
        <div class="card activity">
          <h3>Activity Pulse</h3>
          <div style="font-size:11px;color:var(--muted)">Contributions this year: <!-- LIVE:contributions -->1055<!-- /LIVE:contributions --></div>
          <div class="heat">
            <div class="cell"></div><div class="cell on"></div><div class="cell mid"></div><div class="cell hi"></div><div class="cell on"></div><div class="cell"></div><div class="cell mid"></div><div class="cell on"></div><div class="cell"></div><div class="cell hi"></div><div class="cell on"></div><div class="cell mid"></div><div class="cell"></div><div class="cell on"></div><div class="cell hi"></div><div class="cell on"></div><div class="cell"></div><div class="cell mid"></div><div class="cell on"></div><div class="cell hi"></div><div class="cell on"></div><div class="cell"></div><div class="cell mid"></div><div class="cell on"></div><div class="cell hi"></div><div class="cell on"></div><div class="cell"></div><div class="cell mid"></div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
