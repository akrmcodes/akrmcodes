<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" fill="none" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Akrm Qubati  Designer OS</title>
  <desc id="heroDesc">Cinematic hero with aurora mesh, monogram, CSS typewriter roles, and glass social pills.</desc>
  <defs>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8b4d9"/>
      <stop offset="50%" stop-color="#d8b4fe"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4b1ab1"/>
    </linearGradient>
    <radialGradient id="meshA" cx="12%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#4b1ab1" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#4b1ab1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="meshB" cx="88%" cy="22%" r="48%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="meshC" cx="50%" cy="95%" r="55%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes meshDrift{0%{transform:translate(0,0)}50%{transform:translate(12px,-6px)}100%{transform:translate(0,0)}}
      @keyframes borderGlow{0%,100%{stop-opacity:.35}50%{stop-opacity:.7}}
      @media (prefers-reduced-motion:reduce){.motion{animation:none!important;opacity:.8}}
    </style>
  </defs>
  <!-- Native SVG fallback background -->
  <rect width="1200" height="380" fill="#0a0814"/>
  <g class="motion" style="animation:meshDrift 18s ease-in-out infinite">
    <rect width="1200" height="380" fill="url(#meshA)"/>
    <rect width="1200" height="380" fill="url(#meshB)"/>
    <rect width="1200" height="380" fill="url(#meshC)"/>
  </g>
  <rect width="1200" height="380" fill="#0a0814" fill-opacity=".4"/>
  <rect x="1" y="1" width="1198" height="378" rx="14" stroke="url(#violet)" stroke-opacity=".35" fill="none"/>
  <foreignObject width="1200" height="380">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:1200px;height:380px;font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;overflow:hidden;box-sizing:border-box;">
      <style>
        :root{--bg:#0a0814;--surface:rgba(15,12,28,.78);--text:#f5f3ff;--muted:#a78bfa;--accent:#7c3aed;--aurora:linear-gradient(90deg,#f8b4d9,#d8b4fe,#a5f3fc);--border:rgba(124,58,237,.35)}
        @media (prefers-color-scheme:light){
          :root{--bg:#f8f7ff;--surface:rgba(255,255,255,.82);--text:#1a1033;--muted:#5b21b6;--accent:#6d28d9;--border:rgba(109,40,217,.25)}
        }
        *{box-sizing:border-box;margin:0;padding:0}
        .hero{display:grid;grid-template-columns:200px 1fr;gap:32px;align-items:center;height:380px;padding:28px 48px;background:transparent;color:var(--text)}
        .logo-wrap{position:relative;width:168px;height:168px;display:flex;align-items:center;justify-content:center}
        .logo-wrap::before{content:'';position:absolute;inset:-8px;border-radius:50%;background:var(--aurora);opacity:.18;filter:blur(18px);animation:pulse 4s ease-in-out infinite}
        .logo-wrap img{width:148px;height:148px;border-radius:50%;position:relative;z-index:1}
        .badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:999px;background:var(--surface);border:1px solid var(--border);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
        .dot{width:7px;height:7px;border-radius:50%;background:#22d3ee;box-shadow:0 0 10px #22d3ee;animation:blink 2s step-end infinite}
        h1{font-size:42px;font-weight:700;line-height:1.1;background:var(--aurora);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:6px}
        .handle{font-size:15px;color:var(--muted);margin-bottom:18px;font-weight:500}
        .roles{position:relative;height:32px;margin-bottom:22px}
        .role{position:absolute;left:0;top:0;font-size:18px;font-weight:600;color:var(--text);opacity:0;white-space:nowrap}
        .role:nth-child(1){animation:role1 16s infinite}
        .role:nth-child(2){animation:role2 16s infinite}
        .role:nth-child(3){animation:role3 16s infinite}
        .role:nth-child(4){animation:role4 16s infinite}
        .pills{display:flex;flex-wrap:wrap;gap:10px}
        .pill{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:10px;background:var(--surface);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text);text-decoration:none;backdrop-filter:blur(8px);transition:transform .2s}
        .pill:hover{transform:translateY(-1px)}
        .pill .ico{font-size:13px}
        .motto{margin-top:16px;font-size:13px;font-style:italic;color:var(--muted);opacity:.9}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        @keyframes pulse{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.28;transform:scale(1.04)}}
        @keyframes role1{0%,3%{opacity:0}4%,22%{opacity:1}23%,100%{opacity:0}}
        @keyframes role2{0%,24%{opacity:0}25%,47%{opacity:1}48%,100%{opacity:0}}
        @keyframes role3{0%,49%{opacity:0}50%,72%{opacity:1}73%,100%{opacity:0}}
        @keyframes role4{0%,74%{opacity:0}75%,97%{opacity:1}98%,100%{opacity:0}}
        @media (prefers-reduced-motion:reduce){.role:nth-child(1){opacity:1;animation:none}.role:not(:nth-child(1)){display:none}.dot,.logo-wrap::before{animation:none}}
      </style>
      <div class="hero">
        <div class="logo-wrap">
          <img src="data:image/svg+xml;base64," alt="AK Monogram"/>
        </div>
        <div>
          <div class="badge"><span class="dot"></span> Designer OS &middot; Online</div>
          <h1>Akrm Qubati</h1>
          <div class="handle">akrmcodes &middot; Sana'a, Yemen</div>
          <div class="roles">
            <span class="role">Full-Stack Web &amp; Mobile</span>
            <span class="role">UI/UX Systems &amp; Prototypes</span>
            <span class="role">API &amp; AI Integrations</span>
            <span class="role">Performance &amp; Accessibility</span>
          </div>
          <div class="pills">
            <span class="pill"><span class="ico">	</span> akrm.codes@gmail.com</span>
            <span class="pill"><span class="ico">in</span> LinkedIn</span>
            <span class="pill"><span class="ico">5O</span> Twitter</span>
            <span class="pill"><span class="ico">X</span> Portfolio</span>
          </div>
          <div class="motto">"Crafting code through a designer's lens."</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
