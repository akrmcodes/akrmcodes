<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" fill="none" aria-labelledby="title desc">
  <title id="title">Akrm Qubati  Identity</title>
  <desc id="desc">Aurora glass identity card with monogram, name, location, and motto.</desc>
  <defs>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8b4d9"/>
      <stop offset="50%" stop-color="#d8b4fe"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4b1ab1"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="80%" cy="80%" r="45%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset dy="2" result="off"/>
      <feComposite in="off" in2="blur" operator="out" result="shadow"/>
      <feColorMatrix in="shadow" values="0 0 0 0 0.05 0 0 0 0 0.02 0 0 0 0 0.12 0 0 0 0.4 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
      @media (prefers-reduced-motion:reduce){.motion{opacity:.6!important}}
    </style>
  </defs>
  <rect width="420" height="300" rx="12" fill="#0f0c1c"/>
  <rect width="420" height="300" rx="12" fill="url(#glowL)"/>
  <rect width="420" height="300" rx="12" fill="url(#glowR)"/>
  <rect x=".5" y=".5" width="419" height="299" rx="11.5" stroke="url(#violet)" stroke-opacity=".45" fill="rgba(15,12,28,0.72)"/>
  <rect x="12" y="12" width="396" height="276" rx="8" fill="#ffffff" fill-opacity=".03"/>
  <g class="motion" filter="url(#glass)">
    <circle cx="90" cy="110" r="52" fill="none" stroke="url(#aurora)" stroke-opacity=".5" stroke-width="1.5"/>
    <circle cx="90" cy="110" r="44" fill="#1a1530" stroke="url(#violet)" stroke-width="1.2"/>
    <text x="90" y="118" text-anchor="middle" fill="url(#aurora)" font-size="28" font-weight="700">AK</text>
    <circle cx="90" cy="110" r="52" fill="none" stroke="url(#aurora)" stroke-width="1" stroke-dasharray="4 8" opacity=".6">
      <animateTransform attributeName="transform" type="rotate" from="0 90 110" to="360 90 110" dur="24s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="165" y="88" fill="#f5f3ff" font-size="22" font-weight="600">Akrm Qubati</text>
  <text x="165" y="114" fill="#a78bfa" font-size="13" font-weight="500">Designer-Engineer</text>
  <rect x="165" y="128" width="120" height="22" rx="6" fill="#7c3aed" fill-opacity=".15" stroke="#7c3aed" stroke-opacity=".3"/>
  <text x="225" y="143" text-anchor="middle" fill="#c4b5fd" font-size="11">Sana'a, Yemen</text>
  <line x1="165" y1="168" x2="395" y2="168" stroke="url(#violet)" stroke-opacity=".25"/>
  <text x="165" y="195" fill="#e9d5ff" font-size="12" font-style="italic" opacity=".9">"Crafting code through</text>
  <text x="165" y="213" fill="#e9d5ff" font-size="12" font-style="italic" opacity=".9">a designer's lens."</text>
  <g transform="translate(24 240)">
    <rect width="72" height="24" rx="6" fill="#7c3aed" fill-opacity=".12" stroke="#7c3aed" stroke-opacity=".25"/>
    <text x="36" y="16" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="500">Web</text>
  </g>
  <g transform="translate(104 240)">
    <rect width="72" height="24" rx="6" fill="#7c3aed" fill-opacity=".12" stroke="#7c3aed" stroke-opacity=".25"/>
    <text x="36" y="16" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="500">Mobile</text>
  </g>
  <g transform="translate(184 240)">
    <rect width="72" height="24" rx="6" fill="#7c3aed" fill-opacity=".12" stroke="#7c3aed" stroke-opacity=".25"/>
    <text x="36" y="16" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="500">UI/UX</text>
  </g>
  <g transform="translate(264 240)">
    <rect width="72" height="24" rx="6" fill="#7c3aed" fill-opacity=".12" stroke="#7c3aed" stroke-opacity=".25"/>
    <text x="36" y="16" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="500">AI APIs</text>
  </g>
</svg>
