<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 250" fill="none" aria-labelledby="title desc">
  <title id="title">Featured Project</title>
  <desc id="desc">Glassmorphic project showcase card template.</desc>
  <defs>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8b4d9"/>
      <stop offset="50%" stop-color="#d8b4fe"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4b1ab1"/>
    </linearGradient>
    <linearGradient id="thumbGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1530"/>
      <stop offset="100%" stop-color="#2d1f5e"/>
    </linearGradient>
    <style>
      text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
      @media (prefers-reduced-motion:reduce){.shimmer{animation:none!important}}
      @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
    </style>
  </defs>
  <rect width="380" height="250" rx="12" fill="#0f0c1c"/>
  <rect x=".5" y=".5" width="379" height="249" rx="11.5" stroke="url(#violet)" stroke-opacity=".4" fill="rgba(15,12,28,0.72)"/>
  <!-- Thumbnail area -->
  <rect x="16" y="16" width="348" height="120" rx="8" fill="url(#thumbGrad)"/>
  <rect x="16" y="16" width="348" height="120" rx="8" stroke="url(#violet)" stroke-opacity=".2"/>
  <g clip-path="url(#thumbClip)">
    <rect x="16" y="16" width="348" height="120" rx="8" fill="url(#aurora)" opacity=".08"/>
    <path d="M40 110 L120 50 L200 90 L280 40 L360 80" stroke="url(#aurora)" stroke-width="1.5" fill="none" opacity=".4"/>
    <circle cx="120" cy="50" r="4" fill="#d8b4fe" opacity=".6"/>
    <circle cx="280" cy="40" r="4" fill="#a5f3fc" opacity=".6"/>
    <g class="shimmer" style="animation:shimmer 4s ease-in-out infinite">
      <rect x="16" y="16" width="80" height="120" fill="#fff" opacity=".04" transform="skewX(-20)"/>
    </g>
  </g>
  <clipPath id="thumbClip"><rect x="16" y="16" width="348" height="120" rx="8"/></clipPath>
  <!-- Status badge -->
  <rect x="28" y="28" width="88" height="22" rx="6" fill="#7c3aed" fill-opacity=".25" stroke="#7c3aed" stroke-opacity=".5"/>
  <text x="72" y="43" text-anchor="middle" fill="#e9d5ff" font-size="10" font-weight="600">FEATURED</text>
  <!-- Content -->
  <text x="24" y="162" fill="#f5f3ff" font-size="16" font-weight="600">Your Project</text>
  <text x="24" y="182" fill="#a78bfa" font-size="11">One-liner description goes here</text>
  <!-- Stack pills -->
  <rect x="24" y="198" width="56" height="20" rx="5" fill="#7c3aed" fill-opacity=".12" stroke="#7c3aed" stroke-opacity=".25"/>
  <text x="52" y="212" text-anchor="middle" fill="#c4b5fd" font-size="9">Stack</text>
  <rect x="88" y="198" width="56" height="20" rx="5" fill="#7c3aed" fill-opacity=".12" stroke="#7c3aed" stroke-opacity=".25"/>
  <text x="116" y="212" text-anchor="middle" fill="#c4b5fd" font-size="9">Stack</text>
  <!-- CTA hints -->
  <text x="24" y="238" fill="#6b7280" font-size="10">Configure repo links in README</text>
  <circle cx="350" cy="230" r="14" fill="#7c3aed" fill-opacity=".2" stroke="url(#violet)" stroke-width="1"/>
  <path d="M344 230 L354 230 M354 230 L350 226 M354 230 L350 234" stroke="#c4b5fd" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
