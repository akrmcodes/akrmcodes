<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" fill="none" aria-labelledby="title desc">
  <title id="title">Tech Constellation</title>
  <desc id="desc">Animated constellation of connected technology nodes.</desc>
  <defs>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f8b4d9"/>
      <stop offset="50%" stop-color="#d8b4fe"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4b1ab1"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8b4fe" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <style>
      text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
      @media (prefers-reduced-motion:reduce){.pulse,.flow{animation:none!important}}
      @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
      @keyframes flow{0%{stroke-dashoffset:20}100%{stroke-dashoffset:0}}
    </style>
  </defs>
  <rect width="860" height="220" rx="12" fill="#0f0c1c"/>
  <rect x=".5" y=".5" width="859" height="219" rx="11.5" stroke="url(#violet)" stroke-opacity=".35" fill="rgba(15,12,28,0.65)"/>
  <text x="28" y="32" fill="#f5f3ff" font-size="14" font-weight="600">Tech Constellation</text>
  <text x="28" y="50" fill="#a78bfa" font-size="11">Connected stack  design to deployment</text>
  <!-- Connection lines -->
  <g stroke="url(#aurora)" stroke-width="1.2" stroke-opacity=".35" fill="none" class="flow" stroke-dasharray="6 4" style="animation:flow 3s linear infinite">
    <path d="M130 130 C200 80, 260 80, 330 110"/>
    <path d="M330 110 C400 140, 460 90, 530 110"/>
    <path d="M530 110 C600 130, 660 70, 730 110"/>
    <path d="M330 110 C400 60, 460 150, 530 110"/>
    <path d="M130 130 C200 170, 260 150, 330 110"/>
  </g>
  <!-- Animated pulse lines overlay -->
  <g stroke="#7c3aed" stroke-width="1" fill="none" opacity=".5" class="pulse" style="animation:pulse 2.4s ease-in-out infinite">
    <path d="M130 130 C200 80, 260 80, 330 110"/>
    <path d="M530 110 C600 130, 660 70, 730 110"/>
  </g>
  <!-- Nodes -->
  <g id="react">
    <circle cx="130" cy="130" r="28" fill="url(#nodeGlow)" class="pulse" style="animation:pulse 2s ease-in-out infinite"/>
    <circle cx="130" cy="130" r="22" fill="#1a1530" stroke="url(#violet)" stroke-width="1.2"/>
    <text x="130" y="135" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="600">React</text>
  </g>
  <g id="next">
    <circle cx="330" cy="110" r="28" fill="url(#nodeGlow)" class="pulse" style="animation:pulse 2.2s ease-in-out infinite .3s"/>
    <circle cx="330" cy="110" r="22" fill="#1a1530" stroke="url(#violet)" stroke-width="1.2"/>
    <text x="330" y="115" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="600">Next.js</text>
  </g>
  <g id="flutter">
    <circle cx="530" cy="110" r="28" fill="url(#nodeGlow)" class="pulse" style="animation:pulse 2.1s ease-in-out infinite .6s"/>
    <circle cx="530" cy="110" r="22" fill="#1a1530" stroke="url(#violet)" stroke-width="1.2"/>
    <text x="530" y="115" text-anchor="middle" fill="#e9d5ff" font-size="10" font-weight="600">Flutter</text>
  </g>
  <g id="figma">
    <circle cx="730" cy="110" r="28" fill="url(#nodeGlow)" class="pulse" style="animation:pulse 2.3s ease-in-out infinite .9s"/>
    <circle cx="730" cy="110" r="22" fill="#1a1530" stroke="url(#violet)" stroke-width="1.2"/>
    <text x="730" y="115" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="600">Figma</text>
  </g>
  <g id="node">
    <circle cx="230" cy="170" r="22" fill="#1a1530" stroke="url(#violet)" stroke-width="1" stroke-opacity=".7"/>
    <text x="230" y="175" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="500">Node</text>
  </g>
  <g id="python">
    <circle cx="430" cy="170" r="22" fill="#1a1530" stroke="url(#violet)" stroke-width="1" stroke-opacity=".7"/>
    <text x="430" y="175" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="500">Python</text>
  </g>
  <g id="laravel">
    <circle cx="630" cy="170" r="22" fill="#1a1530" stroke="url(#violet)" stroke-width="1" stroke-opacity=".7"/>
    <text x="630" y="175" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="500">Laravel</text>
  </g>
  <g id="firebase">
    <circle cx="230" cy="70" r="20" fill="#1a1530" stroke="url(#violet)" stroke-width="1" stroke-opacity=".6"/>
    <text x="230" y="74" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="500">Firebase</text>
  </g>
  <g id="docker">
    <circle cx="630" cy="70" r="20" fill="#1a1530" stroke="url(#violet)" stroke-width="1" stroke-opacity=".6"/>
    <text x="630" y="74" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="500">Docker</text>
  </g>
  <line x1="130" y1="170" x2="230" y2="170" stroke="url(#aurora)" stroke-opacity=".2"/>
  <line x1="430" y1="170" x2="530" y2="130" stroke="url(#aurora)" stroke-opacity=".2"/>
  <line x1="630" y1="170" x2="730" y2="130" stroke="url(#aurora)" stroke-opacity=".2"/>
</svg>
