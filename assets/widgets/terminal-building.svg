<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" fill="none" aria-labelledby="title desc">
  <title id="title">Currently Building</title>
  <desc id="desc">macOS-style terminal showing current build focus with typewriter animation.</desc>
  <defs>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4b1ab1"/>
    </linearGradient>
    <style>
      text{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
      @media (prefers-reduced-motion:reduce){.blink,.cursor{animation:none!important}}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    </style>
  </defs>
  <rect width="420" height="220" rx="12" fill="#0f0c1c"/>
  <rect x=".5" y=".5" width="419" height="219" rx="11.5" stroke="url(#violet)" stroke-opacity=".35" fill="rgba(15,12,28,0.72)"/>
  <!-- Title bar -->
  <rect x="12" y="12" width="396" height="32" rx="8" fill="#1a1530"/>
  <circle cx="30" cy="28" r="5" fill="#ff5f57"/>
  <circle cx="48" cy="28" r="5" fill="#febc2e"/>
  <circle cx="66" cy="28" r="5" fill="#28c840"/>
  <text x="210" y="32" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="ui-sans-serif,system-ui,sans-serif">studio  zsh</text>
  <!-- Terminal body -->
  <rect x="12" y="52" width="396" height="156" rx="8" fill="#0a0814"/>
  <text x="24" y="78" fill="#7c3aed" font-size="12">$</text>
  <text x="38" y="78" fill="#a5f3fc" font-size="12">akrm</text>
  <text x="82" y="78" fill="#6b7280" font-size="12"> currently building</text>
  <!-- Line 1 -->
  <text x="24" y="104" fill="#22d3ee" font-size="11">ĺ</text>
  <text x="40" y="104" fill="#e9d5ff" font-size="11">
    <tspan>Next.js design system</tspan>
    <animate attributeName="opacity" values="1;1;0;0;1;1" keyTimes="0;0.24;0.25;0.74;0.75;1" dur="12s" repeatCount="indefinite"/>
  </text>
  <!-- Line 2 -->
  <text x="24" y="126" fill="#22d3ee" font-size="11">ĺ</text>
  <text x="40" y="126" fill="#e9d5ff" font-size="11" opacity="0">
    <tspan>Flutter + Firebase mobile app</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.24;0.25;0.49;0.5;1" dur="12s" repeatCount="indefinite"/>
  </text>
  <!-- Line 3 -->
  <text x="24" y="148" fill="#22d3ee" font-size="11">ĺ</text>
  <text x="40" y="148" fill="#e9d5ff" font-size="11" opacity="0">
    <tspan>AI API integrations</tspan>
    <animate attributeName="opacity" values="0;0;0;0;1;1;0;0" keyTimes="0;0.49;0.5;0.74;0.75;0.99;1;1" dur="12s" repeatCount="indefinite"/>
  </text>
  <!-- Line 4 -->
  <text x="24" y="170" fill="#22d3ee" font-size="11">ĺ</text>
  <text x="40" y="170" fill="#e9d5ff" font-size="11" opacity="0">
    <tspan>Accessible UI prototypes</tspan>
    <animate attributeName="opacity" values="0;0;0;0;0;0;1;1" keyTimes="0;0.74;0.75;0.99;1;1;1;1" dur="12s" repeatCount="indefinite"/>
  </text>
  <!-- Cursor -->
  <rect x="24" y="186" width="8" height="14" fill="#7c3aed" class="blink" style="animation:blink 1s step-end infinite"/>
  <text x="38" y="198" fill="#6b7280" font-size="10" font-family="ui-sans-serif,system-ui,sans-serif">Press Ĺ to cycle focus</text>
</svg>
